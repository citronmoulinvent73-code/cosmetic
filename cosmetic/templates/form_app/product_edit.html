<!--base.htmlを継承-->
{% extends "base.html" %}

{% block content %}
<h1 class="page-title">コスメ編集（運営用）</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-row">
        <label for="id_image">画像</label>

        <!--レビューの画像選択-->
        <div class="image-upload">
            {% if product.image %}
                <img id="current" class="preview" src="{{ product.image.url }}" alt="現在の画像">
            {% else %}
                <img id="current" class="preview hidden" alt="現在の画像">
            {% endif %}

            <p class="help-text">※選択すると上書きされます。</p>

            <input type="file" name="image" id="id_image" accept="image/*" class="form-input">
        </div>
    </div>

    <div class="form-fields">
        {{ form.cosme_name.as_field_group }}
        {{ form.category.as_field_group }}
        {{ form.price.as_field_group }}
    </div>

    <div class="form-actions vertical">
        <button type="submit" class="btn btn-primary">更新</button>
        <a href="{% url 'form_app:admin_my_page' %}" class="link-cancel">キャンセル</a>
    </div>
</form>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById('id_image');
    const current = document.getElementById("current");
    const preview = document.getElementById('preview');

    if(!input) return;

    input.addEventListener('change', () => {
        const file = input.files && input.files[0];
        
        if (!file) {
            if(preview){
                preview.src = "";
                preview.classList.add("hidden");
            }
            return;
        }

        const url = URL.createObjectURL(file);

        if(current){
            current.src = url;
            current.classList.remove("hidden");
        }
    });
});
</script>

{% endblock %}
